<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>協賛各社一覧</title>
  <style>
    :root {
      --bg: #f7f9fc;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --line: #dbe3ee;
      --accent: #1d4ed8;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
      background: linear-gradient(180deg, #f8fbff 0%, var(--bg) 100%);
      color: var(--text);
    }

    .wrap {
      max-width: 860px;
      margin: 0 auto;
      padding: 48px 20px 64px;
    }

    .hero {
      text-align: center;
      margin-bottom: 32px;
    }

    .hero h1 {
      margin: 0 0 10px;
      font-size: clamp(28px, 4vw, 40px);
      line-height: 1.2;
    }

    .hero p {
      margin: 0;
      color: var(--muted);
      font-size: 16px;
    }

    .panel {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 18px;
      box-shadow: 0 12px 30px rgba(15, 23, 42, 0.06);
      overflow: hidden;
    }

    .panel-header {
      padding: 18px 22px;
      border-bottom: 1px solid var(--line);
      background: #f8fbff;
      font-weight: 700;
      color: var(--accent);
    }

    ul.company-list {
      list-style: none;
      margin: 0;
      padding: 8px 0;
    }

    .company-list li {
      padding: 18px 22px;
      border-bottom: 1px solid #eef2f7;
      font-size: 18px;
    }

    .company-list li:last-child {
      border-bottom: none;
    }

    .footer {
      text-align: center;
      margin-top: 20px;
      color: var(--muted);
      font-size: 14px;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="hero">
      <h1>協賛各社一覧</h1>
      <p>ご協力いただいている各社・各団体をご紹介します。</p>
    </section>

    <section class="panel">
      <div class="panel-header">協賛各社</div>
      <ul class="company-list">
        <li>三味線ファンクラブ　矢吹</li>
        <li>池田法律相談室</li>
        <li>オーダースーツの金井</li>
        <li>西川ヘレン美容医療院</li>
        <li>相続対策なら尾形</li>
        <li>ザ・ワインベース銀座</li>
        <li>－－－－－－－－－－－－－－</li>
        <li>AIインテグレーションの高村</li>
      </ul>
    </section>

    <div class="footer">Copyright © 協賛各社一覧</div>
  </main>
</body>
</html>
