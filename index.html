<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>協賛各社一覧</title>
  <style>
    :root {
      --bg: #f7f9fc;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --line: #dbe3ee;
      --accent: #1d4ed8;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
      background: linear-gradient(180deg, #f8fbff 0%, var(--bg) 100%);
      color: var(--text);
    }

    .wrap {
      max-width: 860px;
      margin: 0 auto;
      padding: 48px 20px 64px;
    }

    .hero {
      text-align: center;
      margin-bottom: 32px;
    }

    .hero h1 {
      margin: 0 0 10px;
      font-size: clamp(28px, 4vw, 40px);
      line-height: 1.2;
    }

    .hero p {
      margin: 0;
      color: var(--muted);
      font-size: 16px;
    }

    .panel {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 18px;
      box-shadow: 0 12px 30px rgba(15, 23, 42, 0.06);
      overflow: hidden;
      margin-bottom: 36px;
    }

    .panel-header {
      padding: 18px 22px;
      border-bottom: 1px solid var(--line);
      background: #f8fbff;
      font-weight: 700;
      color: var(--accent);
    }

    ul.company-list {
      list-style: none;
      margin: 0;
      padding: 8px 0;
    }

    .company-list li {
      padding: 18px 22px;
      border-bottom: 1px solid #eef2f7;
      font-size: 18px;
    }

    .company-list li:last-child {
      border-bottom: none;
    }

    .company-name {
      font-weight: 700;
      margin-bottom: 6px;
    }

    .company-pitch {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
      margin-bottom: 8px;
    }

    .company-links a {
      display: inline-block;
      margin-right: 10px;
      font-size: 14px;
      color: var(--accent);
      text-decoration: none;
    }

    .company-links a:hover {
      text-decoration: underline;
    }

    .loading,
    .error {
      padding: 22px;
      color: var(--muted);
      font-size: 15px;
    }

    .gallery {
      display: grid;
      gap: 24px;
      margin-top: 20px;
    }

    .gallery-card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 18px;
      box-shadow: 0 12px 30px rgba(15, 23, 42, 0.06);
      overflow: hidden;
      padding: 16px;
    }

    .gallery-card img {
      display: block;
      width: 100%;
      height: auto;
      border-radius: 12px;
    }

    .gallery-card p {
      margin: 12px 4px 4px;
      color: var(--muted);
      font-size: 14px;
      text-align: center;
    }

    .footer {
      text-align: center;
      margin-top: 28px;
      color: var(--muted);
      font-size: 14px;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="hero">
      <h1>協賛各社一覧</h1>
      <p>ご協力いただいている各社・各団体をご紹介します。</p>
    </section>

    <section class="panel">
      <div class="panel-header">協賛各社</div>
      <ul id="company-list" class="company-list">
        <li class="loading">読み込み中...</li>
      </ul>
    </section>

    <!-- ここは固定で残す -->
    <section class="gallery">
      <div class="gallery-card">
        <img src="shamisen.png" alt="三味線ファンクラブ画像1" />
        <p>三味線ファンクラブ活用イメージ</p>
      </div>

      <div class="gallery-card">
        <img src="igyoushu.png" alt="異業種交流会向け紹介画像" />
        <p>異業種交流会向け活用イメージ</p>
      </div>

      <div class="gallery-card">
        <img src="inshoku.png" alt="銀座飲食グループ紹介画像" />
        <p>銀座飲食グループ向け活用イメージ</p>
      </div>

      <div class="gallery-card">
        <img src="josikai.png" alt="女子会向けAIツール紹介画像" />
        <p>女子会向け活用イメージ</p>
      </div>
    </section>

    <div class="footer">Copyright © 協賛各社一覧</div>
  </main>

  <script>
    // Google Sheets を「ウェブに公開」した前提で CSV を読む
    const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRFwWq4rfEsKrx-kYjiZ5WDpu6ueiBDmDmbPwMQvgQV2mWF2HYbNlVtAwS3WLWH0lfHWs0tC-nm3VeC/pub?output=csv";
  
      function parseCsvLine(line) {
      const result = [];
      let current = "";
      let inQuotes = false;

      for (let i = 0; i < line.length; i++) {
        const char = line[i];
        const next = line[i + 1];

        if (char === '"') {
          if (inQuotes && next === '"') {
            current += '"';
            i++;
          } else {
            inQuotes = !inQuotes;
          }
        } else if (char === "," && !inQuotes) {
          result.push(current);
          current = "";
        } else {
          current += char;
        }
      }

      result.push(current);
      return result;
    }

    function parseCsv(text) {
      const lines = text
        .replace(/\r\n/g, "\n")
        .replace(/\r/g, "\n")
        .split("\n")
        .filter(line => line.trim() !== "");

      if (lines.length === 0) return [];

      const headers = parseCsvLine(lines[0]).map(h => h.trim());

      return lines.slice(1).map(line => {
        const values = parseCsvLine(line);
        const row = {};

        headers.forEach((header, index) => {
          row[header] = (values[index] || "").trim();
        });

        return row;
      });
    }

    function isTrue(value) {
      return String(value || "").trim().toUpperCase() === "TRUE";
    }

    function escapeHtml(text) {
      return String(text || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function buildLinks(company) {
      const links = [];

      if (company.site_url) {
        links.push(`<a href="${escapeHtml(company.site_url)}" target="_blank" rel="noopener noreferrer">サイト</a>`);
      }

      if (company.line_url) {
        links.push(`<a href="${escapeHtml(company.line_url)}" target="_blank" rel="noopener noreferrer">LINE</a>`);
      }

      if (company.map_url) {
        links.push(`<a href="${escapeHtml(company.map_url)}" target="_blank" rel="noopener noreferrer">地図</a>`);
      }

      return links.length > 0
        ? `<div class="company-links">${links.join("")}</div>`
        : "";
    }

    function renderCompanies(companies) {
      const list = document.getElementById("company-list");

      const visibleCompanies = companies
        .filter(company => isTrue(company.show_in_html))
        .sort((a, b) => Number(a.sort_order || 9999) - Number(b.sort_order || 9999));

      if (visibleCompanies.length === 0) {
        list.innerHTML = `<li class="error">表示対象の企業がありません。</li>`;
        return;
      }

      list.innerHTML = visibleCompanies.map(company => `
        <li>
          <div class="company-name">${escapeHtml(company.name)}</div>
          ${company.short_pitch ? `<div class="company-pitch">${escapeHtml(company.short_pitch)}</div>` : ""}
          ${buildLinks(company)}
        </li>
      `).join("");
    }

    async function loadCompanies() {
      const list = document.getElementById("company-list");

      try {
        const response = await fetch(CSV_URL, { cache: "no-store" });

        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        const csvText = await response.text();
        const companies = parseCsv(csvText);
        renderCompanies(companies);
      } catch (error) {
        console.error("company_master load error:", error);
        list.innerHTML = `<li class="error">企業一覧の読み込みに失敗しました。</li>`;
      }
    }

    loadCompanies();
  </script>
</body>
</html>
